<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmbalaFlow CRM — Guia visual de redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
    @theme {
      --font-sans: "Poppins", system-ui, sans-serif;
      --font-serif: "Lora", Georgia, serif;
      --text-ui-meta: 0.75rem;
      --text-ui-sm: 0.8125rem;
      --text-ui-body: 0.875rem;
      --text-ui-md: 1rem;
      --text-ui-lg: 1.125rem;
      --text-ui-title: 1.25rem;
      --text-ui-display: 1.5rem;
    }
  </style>
  <style>
    :root {
      --brand-dark: #141413;
      --brand-light: #faf9f5;
      --brand-orange: #d97757;
      --brand-blue: #6a9bcc;
      --brand-surface: #e8e6dc;
      --brand-mid: #b0aea5;
      --shadow-brand-sm: 0 1px 2px rgba(20, 20, 19, 0.06);
      --shadow-brand-md: 0 4px 12px rgba(20, 20, 19, 0.08);
      --shadow-brand-lg: 0 12px 32px rgba(20, 20, 19, 0.1);
      --shadow-brand-xl: 0 24px 48px rgba(20, 20, 19, 0.12);
    }
    .artifact.dark {
      --brand-dark: #ebeae6;
      --brand-light: #141413;
      --brand-orange: #e08a6e;
      --brand-blue: #7aa8d4;
      --brand-surface: #242422;
      --brand-mid: #8f8d86;
      --shadow-brand-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
      --shadow-brand-md: 0 4px 12px rgba(0, 0, 0, 0.35);
      --shadow-brand-lg: 0 12px 32px rgba(0, 0, 0, 0.4);
      --shadow-brand-xl: 0 24px 48px rgba(0, 0, 0, 0.45);
    }
    .artifact {
      font-family: var(--font-sans);
      color: var(--brand-dark);
      background: var(--brand-light);
    }
    .font-mono-tabular {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    @keyframes slideInBanner {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-banner {
      animation: slideInBanner 0.35s ease-out forwards;
    }
  </style>
</head>
<body class="m-0 min-h-screen">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const SNIPPETS = {
      themeExtend: `/* client/src/index.css — adicionar em @theme */
--color-brand-orange-50: #faf4f1;
--color-brand-orange-200: #e8b5a3;
--color-brand-orange-400: #d97757;
--color-brand-orange-600: #b85d3f;
--color-brand-blue-50: #eef4fa;
--color-brand-blue-200: #a8c4e0;
--color-brand-blue-400: #6a9bcc;
--color-brand-blue-600: #4a7aad;
--shadow-brand-sm: 0 1px 2px color-mix(in srgb, var(--color-brand-dark) 6%, transparent);
--shadow-brand-md: 0 4px 12px color-mix(in srgb, var(--color-brand-dark) 8%, transparent);
--shadow-brand-lg: 0 12px 32px color-mix(in srgb, var(--color-brand-dark) 10%, transparent);
--shadow-brand-xl: 0 24px 48px color-mix(in srgb, var(--color-brand-dark) 12%, transparent);
--color-success: #788c5d;
--color-warning: #c9a227;
--color-danger: #c45c4a;
--color-info: var(--color-brand-blue);`,
      kpiCard: `// Diff sugerido — wrapper do KPI
<div className="rounded-lg border border-[var(--color-border)] bg-card p-4 shadow-[var(--shadow-brand-sm)]">
  <div className="flex items-start justify-between gap-3">
    <div>
      <p className="text-[length:var(--text-ui-sm)] text-muted-foreground">Orçamentos (mês)</p>
      <p className="text-[length:var(--text-ui-display)] font-semibold tabular-nums">42</p>
      <span className="text-[length:var(--text-ui-meta)] text-[var(--color-brand-orange)]">+12% vs. mês anterior</span>
    </div>
    <Sparkline points={spark} className="text-[var(--color-brand-orange)]" />
  </div>
</div>`,
      kanbanCard: `// Ocultar StatusBadge na coluna; faixa = estado da coluna
<div className="relative overflow-hidden rounded-md border bg-card shadow-sm transition-shadow hover:shadow-[var(--shadow-brand-md)]">
  <div className="h-1 bg-[var(--column-accent)]" aria-hidden />
  <div className="p-3 space-y-2">
    <div className="flex gap-2">
      <Avatar initials="AC" />
      <div className="min-w-0 flex-1">
        <p className="truncate font-medium text-[length:var(--text-ui-body)]">Acme Indústria</p>
        <p className="flex items-center gap-1 text-[length:var(--text-ui-meta)] text-muted-foreground">
          <Package className="size-3 shrink-0" /> Caixas kraft 300x200
        </p>
      </div>
    </div>
    <p className="font-mono text-[length:var(--text-ui-sm)]">R$ 12.450,00</p>
    <FollowUpBadge urgency="overdue" label="Follow-up vencido" />
  </div>
</div>`,
      clientRow: `// Lista compacta — 2 linhas desktop; barra lateral por tipo
<li className="flex gap-3 rounded-md border border-transparent px-2 py-2 hover:bg-muted/60">
  <span className="w-1 shrink-0 rounded-full bg-[var(--type-accent)]" aria-hidden />
  <div className="min-w-0 flex-1">
    <div className="flex flex-wrap items-baseline gap-x-2 gap-y-0">
      <span className="font-medium">Beta Logística</span>
      <span className="text-[length:var(--text-ui-meta)] text-muted-foreground">SP</span>
    </div>
    <p className="text-[length:var(--text-ui-meta)] text-muted-foreground">
      Último contato <ContactDot recency="fresh" /> há 3 dias
    </p>
  </div>
</li>`,
      followUpQueue: `// SectionCard ou div com dois blocos
<section aria-labelledby="fq-overdue">
  <h3 id="fq-overdue" className="flex items-center gap-2">
    Vencidos <Badge variant="destructive">{count}</Badge>
  </h3>
  <ul className="space-y-2 rounded-lg border-2 border-red-500/40 bg-red-500/5 p-3">...</ul>
</section>
<section aria-labelledby="fq-upcoming" className="mt-6">...</section>`,
      kanbanColumn: `// Cabeçalho da coluna + altura máxima
<div className="flex max-h-[min(70vh,560px)] flex-col rounded-lg bg-muted/40">
  <header className="shrink-0 border-b px-3 py-2">
    <span className="font-medium">Proposta</span>
    <span className="ml-2 tabular-nums text-muted-foreground">Σ R$ 128k</span>
  </header>
  <div className="min-h-0 flex-1 overflow-y-auto p-2 space-y-2">...</div>
</div>`,
      mobileNav: `// Bottom nav: 5º item "Mais" abre Sheet
<nav className="fixed bottom-0 ... grid grid-cols-5">
  <NavItem icon={Home} badge={overdueCount} />
  ...
  <button type="button" onClick={() => setMoreOpen(true)}>Mais</button>
</nav>
<Sheet open={moreOpen}>Produtos, Relatórios, Equipa</Sheet>`,
      aiAssistant: `// FAB mobile + preview colapsado desktop
<button type="button" className="fixed bottom-20 right-4 z-50 md:hidden ..." onClick={openAi}>
  <Sparkles />
</button>
<aside className={cn(collapsed && "w-12")}>
  {!collapsed && <LastReplyPreview text={lastReply} />}
</aside>`,
      formValidation: `// onBlur — sem <form submit>; usar type="button" nos CTAs
<Input
  aria-invalid={!!err}
  className={cn(err && "border-destructive focus-visible:ring-destructive/30")}
  onBlur={() => validateField("email")}
/>
{err && <p className="text-[length:var(--text-ui-meta)] text-destructive">{err}</p>}`,
    };

    function cn(...parts) {
      return parts.filter(Boolean).join(" ");
    }

    function CopyBlock({ label, code }) {
      const [done, setDone] = useState(false);
      return (
        <div className="mt-4 rounded-md border border-[color-mix(in_srgb,var(--brand-dark)_12%,transparent)] bg-[color-mix(in_srgb,var(--brand-surface)_40%,transparent)] p-3">
          <div className="mb-2 flex items-center justify-between gap-2">
            <span className="text-[length:var(--text-ui-sm)] font-medium opacity-80">{label}</span>
            <button
              type="button"
              onClick={() => {
                navigator.clipboard.writeText(code);
                setDone(true);
                setTimeout(() => setDone(false), 2000);
              }}
              className="rounded-md bg-[var(--brand-orange)] px-3 py-1 text-[length:var(--text-ui-meta)] font-medium text-white transition hover:opacity-90"
            >
              {done ? "Copiado" : "Copiar"}
            </button>
          </div>
          <pre className="max-h-48 overflow-auto whitespace-pre-wrap break-all text-[length:var(--text-ui-meta)] leading-relaxed opacity-90">{code}</pre>
        </div>
      );
    }

    function ToggleBeforeAfter({ value, onChange, className }) {
      return (
        <div className={cn("inline-flex rounded-lg border p-0.5 text-[length:var(--text-ui-sm)]", className)} style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 15%, transparent)" }}>
          <button
            type="button"
            onClick={() => onChange("before")}
            className={cn("rounded-md px-3 py-1.5 font-medium transition", value === "before" ? "bg-[var(--brand-dark)] text-[var(--brand-light)]" : "opacity-70 hover:opacity-100")}
          >
            Antes
          </button>
          <button
            type="button"
            onClick={() => onChange("after")}
            className={cn("rounded-md px-3 py-1.5 font-medium transition", value === "after" ? "bg-[var(--brand-orange)] text-white" : "opacity-70 hover:opacity-100")}
          >
            Depois
          </button>
        </div>
      );
    }

    function Sparkline({ className = "" }) {
      const pts = "0,24 12,18 24,20 36,10 48,14 60,6 72,8 84,2";
      return (
        <svg width="88" height="28" viewBox="0 0 88 28" className={className} aria-hidden>
          <polyline fill="none" stroke="currentColor" strokeWidth="1.5" points={pts} />
        </svg>
      );
    }

    function KpiDemo({ mode }) {
      if (mode === "before") {
        return (
          <div className="rounded-lg border p-4" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 12%, transparent)", background: "color-mix(in srgb, white 80%, transparent)" }}>
            <p className="text-[length:var(--text-ui-sm)] opacity-60">Orçamentos (mês)</p>
            <p className="text-3xl font-semibold tabular-nums">42</p>
          </div>
        );
      }
      return (
        <div className="rounded-lg border p-4 shadow-[var(--shadow-brand-sm)]" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 12%, transparent)", background: "color-mix(in srgb, white 85%, transparent)" }}>
          <div className="flex items-start justify-between gap-3">
            <div>
              <p className="text-[length:var(--text-ui-sm)] opacity-60">Orçamentos (mês)</p>
              <p className="text-[length:var(--text-ui-display)] font-semibold tabular-nums">42</p>
              <p className="text-[length:var(--text-ui-meta)] font-medium" style={{ color: "var(--brand-orange)" }}>+12% vs. mês anterior</p>
            </div>
            <div className="rounded-md bg-[color-mix(in_srgb,var(--brand-orange)_12%,transparent)] p-1" style={{ color: "var(--brand-orange)" }}>
              <Sparkline />
            </div>
          </div>
        </div>
      );
    }

    function KanbanCardDemo({ mode }) {
      const topBar = mode === "after" ? <div className="h-1 w-full bg-[var(--brand-blue)]" /> : null;
      const shadow = mode === "after" ? "hover:shadow-[var(--shadow-brand-md)]" : "";
      return (
        <div className={cn("relative max-w-xs overflow-hidden rounded-md border transition-shadow", shadow)} style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 12%, transparent)", background: "color-mix(in srgb, white 90%, transparent)" }}>
          {topBar}
          <div className="p-3 space-y-2">
            <div className="flex gap-2">
              <div className="flex size-9 shrink-0 items-center justify-center rounded-full text-[length:var(--text-ui-sm)] font-semibold text-white" style={{ background: "var(--brand-orange)" }}>AC</div>
              <div className="min-w-0 flex-1">
                <p className="truncate font-medium">Acme Indústria</p>
                {mode === "before" && <p className="text-[length:var(--text-ui-meta)] opacity-60">Proposta enviada</p>}
                <p className="flex items-center gap-1 text-[length:var(--text-ui-meta)] opacity-70">
                  <span aria-hidden>📦</span> Caixas kraft 300×200 mm
                </p>
              </div>
            </div>
            <p className="font-mono-tabular text-[length:var(--text-ui-sm)] font-medium">R$ 12.450,00</p>
            {mode === "after" ? (
              <span className="inline-block rounded-full bg-red-500/15 px-2 py-0.5 text-[length:var(--text-ui-meta)] font-medium text-red-700 dark:text-red-300">Follow-up vencido</span>
            ) : (
              <span className="inline-block rounded-full bg-muted px-2 py-0.5 text-[length:var(--text-ui-meta)] opacity-80">Proposta</span>
            )}
          </div>
        </div>
      );
    }

    function ClientListDemo({ mode }) {
      const rows = [
        { name: "Beta Logística", loc: "SP", type: "recompra", days: 3 },
        { name: "Gamma Embalagens", loc: "RJ", type: "novo", days: 18 },
      ];
      return (
        <ul className="space-y-2">
          {rows.map((r) => {
            const typeColor = r.type === "novo" ? "var(--brand-blue)" : "#788c5d";
            let dotColor = "#22c55e";
            if (r.days > 30) dotColor = "#ef4444";
            else if (r.days >= 7) dotColor = "#eab308";
            return (
              <li key={r.name} className="flex gap-3 rounded-md border px-2 py-2" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 8%, transparent)" }}>
                {mode === "after" && <span className="w-1 shrink-0 rounded-full self-stretch" style={{ background: typeColor }} />}
                <div className="min-w-0 flex-1">
                  {mode === "before" ? (
                    <>
                      <p className="font-medium">{r.name}</p>
                      <p className="text-[length:var(--text-ui-meta)] opacity-60">{r.loc} · {r.type}</p>
                      <p className="text-[length:var(--text-ui-meta)] opacity-60">Último contato há {r.days} dias</p>
                    </>
                  ) : (
                    <>
                      <div className="flex flex-wrap items-baseline gap-x-2">
                        <span className="font-medium">{r.name}</span>
                        <span className="text-[length:var(--text-ui-meta)] opacity-60">{r.loc}</span>
                      </div>
                      <p className="text-[length:var(--text-ui-meta)] opacity-70">
                        Último contato <span className="inline-block size-2 rounded-full align-middle" style={{ background: dotColor }} title="recência" /> há {r.days} dias
                      </p>
                    </>
                  )}
                </div>
              </li>
            );
          })}
        </ul>
      );
    }

    function SkeletonBlock({ variant }) {
      if (variant === "kanban") {
        return (
          <div className="flex gap-3">
            {[1, 2, 3].map((i) => (
              <div key={i} className="h-40 w-36 shrink-0 space-y-2 rounded-md border p-2" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 10%, transparent)" }}>
                <div className="h-3 w-3/4 animate-pulse rounded bg-[color-mix(in_srgb,var(--brand-mid)_35%,transparent)]" />
                <div className="h-3 w-1/2 animate-pulse rounded bg-[color-mix(in_srgb,var(--brand-mid)_25%,transparent)]" />
                <div className="h-16 animate-pulse rounded bg-[color-mix(in_srgb,var(--brand-mid)_20%,transparent)]" />
              </div>
            ))}
          </div>
        );
      }
      if (variant === "list") {
        return (
          <div className="space-y-2">
            {[1, 2, 3, 4].map((i) => (
              <div key={i} className="flex gap-3 py-2">
                <div className="size-9 shrink-0 animate-pulse rounded-full bg-[color-mix(in_srgb,var(--brand-mid)_30%,transparent)]" />
                <div className="flex-1 space-y-2">
                  <div className="h-3 w-1/3 animate-pulse rounded bg-[color-mix(in_srgb,var(--brand-mid)_30%,transparent)]" />
                  <div className="h-3 w-2/3 animate-pulse rounded bg-[color-mix(in_srgb,var(--brand-mid)_20%,transparent)]" />
                </div>
              </div>
            ))}
          </div>
        );
      }
      return (
        <div className="grid grid-cols-2 gap-4 md:grid-cols-4">
          {[1, 2, 3, 4].map((i) => (
            <div key={i} className="h-24 animate-pulse rounded-lg bg-[color-mix(in_srgb,var(--brand-mid)_25%,transparent)]" />
          ))}
        </div>
      );
    }

    function FollowUpQueueDemo({ mode }) {
      if (mode === "before") {
        return (
          <ul className="space-y-2 rounded-lg border p-3" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 12%, transparent)" }}>
            <li className="flex justify-between text-[length:var(--text-ui-sm)]"><span>Ligar — Acme</span><span className="opacity-60">Ontem</span></li>
            <li className="flex justify-between text-[length:var(--text-ui-sm)]"><span>Proposta — Beta</span><span className="opacity-60">Em 5 dias</span></li>
          </ul>
        );
      }
      return (
        <div className="space-y-6">
          <section>
            <h4 className="mb-2 flex items-center gap-2 text-[length:var(--text-ui-sm)] font-semibold">
              Vencidos
              <span className="rounded-full bg-red-500 px-2 py-0.5 text-[length:var(--text-ui-meta)] text-white">2</span>
            </h4>
            <ul className="space-y-2 rounded-lg border-2 border-red-500/50 bg-red-500/5 p-3">
              <li className="flex items-center justify-between gap-2 text-[length:var(--text-ui-sm)]">
                <span>Ligar — Acme</span>
                <button type="button" className="shrink-0 rounded-md border px-2 py-1 text-[length:var(--text-ui-meta)] font-medium hover:bg-white/50 dark:hover:bg-black/20">Feito</button>
              </li>
            </ul>
          </section>
          <section>
            <h4 className="mb-2 flex items-center gap-2 text-[length:var(--text-ui-sm)] font-semibold">
              Próximos
              <span className="rounded-full bg-[color-mix(in_srgb,var(--brand-blue)_25%,transparent)] px-2 py-0.5 text-[length:var(--text-ui-meta)]">4</span>
            </h4>
            <ul className="space-y-2 rounded-lg border p-3" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 12%, transparent)" }}>
              <li className="flex items-center justify-between gap-2 text-[length:var(--text-ui-sm)]">
                <span>Proposta — Beta</span>
                <button type="button" className="shrink-0 rounded-md border px-2 py-1 text-[length:var(--text-ui-meta)]">Feito</button>
              </li>
            </ul>
          </section>
        </div>
      );
    }

    function KanbanColumnDemo({ mode }) {
      const cards = (
        <div className="space-y-2 p-2">
          <KanbanCardDemo mode={mode === "after" ? "after" : "before"} />
          <div className="h-16 rounded-md border border-dashed opacity-40" />
        </div>
      );
      if (mode === "before") {
        return <div className="max-w-xs rounded-lg border" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 12%, transparent)" }}><div className="border-b px-3 py-2 font-medium">Proposta</div>{cards}</div>;
      }
      return (
        <div className="flex max-h-64 max-w-xs flex-col rounded-lg bg-[color-mix(in_srgb,var(--brand-surface)_35%,transparent)]">
          <header className="shrink-0 border-b px-3 py-2 text-[length:var(--text-ui-sm)]" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 10%, transparent)" }}>
            <span className="font-semibold">Proposta</span>
            <span className="ml-2 tabular-nums opacity-70">Σ R$ 128k</span>
          </header>
          <div className="min-h-0 flex-1 overflow-y-auto">{cards}</div>
        </div>
      );
    }

    function EmptyStateSvg() {
      return (
        <svg viewBox="0 0 120 100" className="mx-auto h-24 w-32 text-[var(--brand-orange)]" aria-hidden>
          <rect x="20" y="25" width="80" height="55" rx="6" fill="currentColor" opacity="0.15" />
          <path d="M35 40 L60 58 L85 38" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
          <circle cx="40" cy="72" r="4" fill="currentColor" opacity="0.5" />
        </svg>
      );
    }

    function MicroDemo() {
      const [formErr, setFormErr] = useState(false);
      const [banner, setBanner] = useState(false);
      return (
        <div className="grid gap-8 lg:grid-cols-2">
          <div>
            <h3 className="mb-3 font-[family-name:var(--font-sans)] text-[length:var(--text-ui-title)] font-semibold">Toasts (marca)</h3>
            <div className="flex flex-wrap gap-2">
              <div className="rounded-md border-l-4 border-l-[#788c5d] bg-[color-mix(in_srgb,#788c5d,12%,transparent)] px-3 py-2 text-[length:var(--text-ui-sm)]">Orçamento guardado.</div>
              <div className="rounded-md border-l-4 border-l-red-500 bg-red-500/10 px-3 py-2 text-[length:var(--text-ui-sm)]">Falha ao sincronizar.</div>
              <div className="rounded-md border-l-4 border-l-[var(--brand-blue)] bg-[color-mix(in_srgb,var(--brand-blue)_12%,transparent)] px-3 py-2 text-[length:var(--text-ui-sm)]">Novo comentário na equipa.</div>
            </div>
          </div>
          <div>
            <h3 className="mb-3 font-[family-name:var(--font-sans)] text-[length:var(--text-ui-title)] font-semibold">Skeletons por contexto</h3>
            <p className="mb-2 text-[length:var(--text-ui-meta)] opacity-70">Dashboard</p>
            <SkeletonBlock variant="dashboard" />
            <p className="mb-2 mt-4 text-[length:var(--text-ui-meta)] opacity-70">Kanban</p>
            <SkeletonBlock variant="kanban" />
          </div>
          <div>
            <h3 className="mb-3 font-[family-name:var(--font-sans)] text-[length:var(--text-ui-title)] font-semibold">Empty state</h3>
            <div className="rounded-lg border p-6 text-center" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 10%, transparent)" }}>
              <EmptyStateSvg />
              <p className="mt-2 text-[length:var(--text-ui-sm)] font-medium">Sem orçamentos neste estágio</p>

                    <li><strong className="font-medium">gap-4 (16px):</strong> itens densos na mesma ferramenta (filtros + lista).</li>
                    <li><strong className="font-medium">gap-6 (24px):</strong> blocos dentro do mesmo ecrã (KPI row → fila follow-up).</li>
                    <li><strong className="font-medium">py-8 / section-padding:</strong> respiro antes de mudar &quot;assunto&quot; na página (ex.: após hero de KPIs).</li>
                  </ul>
                </section>
                <section className="grid gap-6 md:grid-cols-2">
                  <div className="rounded-lg border p-5" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 10%, transparent)" }}>
                    <p className="mb-2 text-[length:var(--text-ui-meta)] font-semibold uppercase tracking-wide opacity-60">Poppins — UI</p>
                    <p className="font-[family-name:var(--font-sans)] text-[length:var(--text-ui-md)]">Botões, tabelas, navegação, labels e métricas.</p>
                  </div>
                  <div className="rounded-lg border p-5" style={{ borderColor: "color-mix(in srgb, var(--brand-dark) 10%, transparent)" }}>
                    <p className="mb-2 text-[length:var(--text-ui-meta)] font-semibold uppercase tracking-wide opacity-60">Lora — prosa</p>
                    <p className="font-[family-name:var(--font-serif)] text-[length:var(--text-ui-md)] leading-relaxed">Notas longas do cliente, descrições de produto em fichas estendidas e textos do assistente quando forem leitura contínua — nunca misturar com células de tabela densa.</p>
                  </div>
                </section>

                <p className="text-[length:var(--text-ui-sm)] opacity-70">Ver a aba <strong className="font-medium">Roadmap</strong> para priorização de entregas.</p>
              </div>
            )}

            {tab === "roadmap" && <RoadmapSection />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
